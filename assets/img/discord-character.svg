/* CAU73  Discord Character */
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 380" class="minecraft-character">
  <defs>
    <linearGradient id="hoodie" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a3a"/>
      <stop offset="100%" style="stop-color:#1a1a28"/>
    </linearGradient>
    <filter id="discordGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="150" cy="340" rx="70" ry="12" fill="rgba(155,89,255,0.15)"/>
  <!-- Sitting legs -->
  <rect x="100" y="260" width="35" height="50" fill="#1a1a28" rx="3" transform="rotate(-20 117 285)"/>
  <rect x="165" y="260" width="35" height="50" fill="#1a1a28" rx="3" transform="rotate(20 182 285)"/>
  <!-- Body / Hoodie -->
  <rect x="95" y="160" width="110" height="110" fill="url(#hoodie)" rx="6"/>
  <rect x="105" y="170" width="90" height="20" fill="#3a3a4a" opacity="0.5" rx="2"/>
  <!-- Arms -->
  <rect x="60" y="175" width="35" height="70" fill="url(#hoodie)" rx="3" transform="rotate(-10 77 210)"/>
  <rect x="205" y="170" width="35" height="75" fill="url(#hoodie)" rx="3" transform="rotate(15 222 207)"/>
  <!-- Head -->
  <rect x="115" y="90" width="70" height="70" fill="#C68642" rx="3"/>
  <!-- Hood -->
  <path d="M105,130 Q150,60 195,130 L195,160 L105,160 Z" fill="#2a2a3a"/>
  <!-- Eyes -->
  <rect x="128" y="115" width="12" height="8" fill="#2C1810"/>
  <rect x="160" y="115" width="12" height="8" fill="#2C1810"/>
  <!-- Discord logo in hands -->
  <g filter="url(#discordGlow)" transform="translate(115, 200)">
    <rect width="70" height="55" rx="14" fill="#5865F2"/>
    <ellipse cx="22" cy="28" rx="10" ry="12" fill="#fff"/>
    <ellipse cx="48" cy="22" rx="12" ry="14" fill="#fff"/>
    <rect x="18" y="18" width="8" height="8" rx="4" fill="#5865F2"/>
    <rect x="44" y="12" width="8" height="8" rx="4" fill="#5865F2"/>
  </g>
  <!-- Purple accent lines on hoodie -->
  <rect x="95" y="200" width="110" height="3" fill="#9b59ff" opacity="0.6"/>
  <rect x="95" y="240" width="110" height="3" fill="#9b59ff" opacity="0.4"/>
</svg>
