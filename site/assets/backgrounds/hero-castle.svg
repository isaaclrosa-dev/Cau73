<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="40%" style="stop-color:#1a2840"/>
      <stop offset="70%" style="stop-color:#2d1f0e"/>
      <stop offset="100%" style="stop-color:#050505"/>
    </linearGradient>
    <radialGradient id="sunset" cx="70%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#ff8c42;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#050505;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1920" height="900" fill="url(#sky)"/>
  <rect width="1920" height="900" fill="url(#sunset)"/>
  <!-- Mountains -->
  <polygon points="0,500 200,300 400,450 600,250 800,400 1000,200 1200,380 1400,280 1600,420 1800,300 1920,450 1920,900 0,900" fill="#0d1520" opacity="0.8"/>
  <!-- Castle silhouette -->
  <g fill="#0a0f18" opacity="0.95">
    <rect x="600" y="280" width="720" height="400"/>
    <rect x="550" y="350" width="80" height="330"/>
    <rect x="1290" y="350" width="80" height="330"/>
    <rect x="520" y="300" width="60" height="380"/>
    <rect x="1340" y="300" width="60" height="380"/>
    <rect x="850" y="180" width="220" height="500"/>
    <rect x="900" y="120" width="120" height="80"/>
    <rect x="620" y="220" width="100" height="460"/>
    <rect x="1200" y="220" width="100" height="460"/>
  </g>
  <!-- Tower tops -->
  <polygon points="550,350 590,280 630,350" fill="#0a0f18"/>
  <polygon points="1290,350 1330,280 1370,350" fill="#0a0f18"/>
  <polygon points="520,300 550,220 580,300" fill="#0a0f18"/>
  <polygon points="1340,300 1370,220 1400,300" fill="#0a0f18"/>
  <polygon points="850,180 960,80 1070,180" fill="#0a0f18"/>
  <!-- Windows glow -->
  <g filter="url(#glow)">
    <rect x="680" y="420" width="30" height="40" fill="#ff9933" opacity="0.9"/>
    <rect x="750" y="420" width="30" height="40" fill="#ff9933" opacity="0.8"/>
    <rect x="820" y="420" width="30" height="40" fill="#ff9933" opacity="0.9"/>
    <rect x="1070" y="420" width="30" height="40" fill="#ff9933" opacity="0.8"/>
    <rect x="1140" y="420" width="30" height="40" fill="#ff9933" opacity="0.9"/>
    <rect x="1210" y="420" width="30" height="40" fill="#ff9933" opacity="0.7"/>
    <rect x="920" y="280" width="40" height="50" fill="#ffcc66" opacity="0.95"/>
    <rect x="980" y="280" width="40" height="50" fill="#ffcc66" opacity="0.9"/>
  </g>
  <!-- Green beacon -->
  <rect x="948" y="40" width="24" height="80" fill="#8DFF2F" opacity="0.9" filter="url(#glow)"/>
  <ellipse cx="960" cy="30" rx="40" ry="20" fill="#8DFF2F" opacity="0.5"/>
  <!-- Ground fog -->
  <rect x="0" y="650" width="1920" height="250" fill="#050505" opacity="0.6"/>
  <linearGradient id="fog" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#050505;stop-opacity:0"/>
    <stop offset="100%" style="stop-color:#050505;stop-opacity:1"/>
  </linearGradient>
  <rect x="0" y="500" width="1920" height="400" fill="url(#fog)"/>
</svg>
